Dựa trên tất cả các trao đổi, tôi đã hệ thống hóa lại toàn bộ yêu cầu của bạn thành một bản đặc tả nghiệp vụ chi tiết. Đây là khung xương để bạn bắt đầu xây dựng hệ thống trên **NestJS, PostgreSQL và Docker**.

---

## 1. Cơ chế tính điểm ưu tiên động (Core Algorithm)
Điểm số (**Score**) của mỗi bệnh nhân không cố định mà biến thiện theo thời gian thực và các sự kiện trong phòng khám.

$$Score = P + T(t) + S + C + F$$

* **P (Priority Base):** Điểm cố định theo đối tượng (Cấp cứu: 1000, VIP: 120, Trẻ em < 6 tuổi: 5, v.v.).
* **T(t) (Time Factor):** Hàm bậc hai $t + 0.04t^2$. Điểm này **tính lại liên tục** theo số phút chờ ($t$) thực tế tại thời điểm tính toán.
* **S (Skip Score - Điểm cộng dồn):**
    * **Case 1 (Thủ công):** Bác sĩ bấm "Bỏ qua" vì gọi không thấy. Điểm cộng dồn theo số lần ($S_1=20, S_2=30, S_3=40$).
    * **Case 2 (Tự động):** Khi một bệnh nhân bị tụt hạng (ví dụ từ hạng 2 xuống hạng 3) do có người ưu tiên hơn chèn ngang, hệ thống tự động cộng thêm điểm bù đắp vào quỹ điểm $S$.
* **C (Check-in/Waiting):** Điểm tích lũy mỗi phút và điểm trừ (-1) nếu đến trễ hẹn.
* **F (Fairness Control):** Điểm điều chỉnh thủ công bởi thư ký cho các ca đặc biệt.

---

## 2. Cấu trúc các Module & Form

### A. Quản lý Cấu hình (Admin)
* **Form Danh mục điểm:** Thiết lập điểm cho từng đối tượng (P), các mốc điểm lỡ lượt (S) và hệ số thời gian (T).
* **Form Cấu hình Phòng khám:**
    * Thiết lập số lượng Slot bác sĩ (5, 10, ...).
    * Mỗi Slot có checkbox **"Trực/Vắng"**. Nếu tick vắng, hệ thống không cho phép đẩy bệnh nhân vào slot đó.

### B. Tiếp nhận & Tạo lượt khám
* **Form Hồ sơ bệnh nhân:** Lưu thông tin hành chính (Họ tên, tuổi, giới tính...).
* **Form Tạo lượt khám:** Chọn bệnh nhân, đối tượng ưu tiên, phòng khám.
    * Sinh ra **ID lượt khám** (UUID/Short ID) có nút **Copy** nhanh.
    * Hỗ trợ 2 loại Check-in: **Khám mới** và **Trả kết quả** (Dựa trên ID lượt khám cũ).

### C. Dashboard Điều phối (Giao diện 3 Lưới)
Hiển thị dữ liệu theo Phòng khám và Ngày (mặc định ngày hiện tại).

1.  **Lưới Chờ khám:**
    * Sắp xếp tự động theo **Score giảm dần**.
    * **Tooltip chi tiết:** Rê chuột vào từng bệnh nhân để xem bảng phân rã điểm ($P, T, S, C, F$) để giải thích tại sao họ đứng ở vị trí đó.
    * Có cột nhập điểm **Fairness (F)** trực tiếp.
2.  **Lưới Đang khám (Dynamic Slots):**
    * Hiển thị danh sách các Slot bác sĩ đang hoạt động.
    * Nút **"Mời vào"**: Gợi ý các Slot đang trống và có bác sĩ trực.
    * Nút **"Bỏ qua (Skip)"**: Kích hoạt Case 1 (Cộng dồn điểm lỡ lượt thủ công).
    * Nút **"Xong"**: Đẩy bệnh nhân xuống lưới "Đã khám" và kích hoạt Event tính lại điểm toàn hệ thống.
3.  **Lưới Đã khám:** Hiển thị danh sách bệnh nhân đã hoàn tất.

---

## 3. Các Sự kiện kích hoạt tính lại điểm (Triggers)
Hệ thống sẽ không tính điểm theo chu kỳ (ví dụ mỗi 1 phút) mà tính dựa trên các **Event** để đảm bảo tính thời gian thực và hiệu năng:

* **Event 1:** Có bệnh nhân mới Check-in hoặc Check-in trả kết quả.
* **Event 2:** Bác sĩ bấm "Xong" (Hoàn tất ca khám).
* **Event 3:** Bác sĩ bấm "Bỏ qua" (Skip thủ công).
* **Event 4:** Thư ký thay đổi trạng thái "Trực/Vắng" của một Slot hoặc chỉnh điểm F.

**Hành động khi có Event:** NestJS thực hiện tính lại $T(t)$, so sánh thứ hạng cũ/mới để cộng dồn $S$ (điểm bị đẩy lùi), sau đó dùng **Socket.io** để đẩy danh sách đã sắp xếp mới nhất xuống tất cả các màn hình của Thư ký và Bác sĩ.

---

## 4. Yêu cầu Kỹ thuật (Implementation)
* **Backend:** NestJS, PostgreSQL (Lưu trữ trạng thái và điểm cộng dồn).
* **Frontend:** Yêu cầu xử lý mượt mà việc Reload lưới mà không làm mất tiêu điểm của người dùng.
* **Deployment:** Docker hóa toàn bộ (Dockerfile cho NestJS và `docker-compose.yml` cho cả hệ thống).

