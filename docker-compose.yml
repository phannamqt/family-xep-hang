version: '3.9'

services:
  app:
    image: phannamit/family-xep-hang:latest
    container_name: xep-hang-app
    ports:
      - '3030:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

# Không cần postgres service vì dùng DB ngoài (db-master.phannam.com)
